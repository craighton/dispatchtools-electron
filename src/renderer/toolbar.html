<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline'" />
    <title>Dispatch Tools</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0b1220;
        --line: #20304a;
        --text: #e6edf6;
        --muted: #8aa0bd;
        --hover: #16233b;
        --press: #1e2f49;
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; }
      body {
        height: 44px;
        background: var(--bg);
        border-bottom: 1px solid var(--line);
        color: var(--text);
        font: 13px/1 system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 0 8px;
        -webkit-user-select: none;
        user-select: none;
      }
      button {
        appearance: none;
        display: inline-flex;
        align-items: center;
        gap: 7px;
        height: 30px;
        padding: 0 12px;
        border: 1px solid transparent;
        border-radius: 8px;
        background: transparent;
        color: var(--text);
        font: inherit;
        font-weight: 500;
        cursor: pointer;
        transition: background 0.12s ease, border-color 0.12s ease, opacity 0.12s ease;
      }
      button:hover { background: var(--hover); }
      button:active { background: var(--press); }
      button:disabled { opacity: 0.4; cursor: default; background: transparent; }
      button svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
      .divider { flex: 0 0 auto; width: 1px; height: 20px; background: var(--line); margin: 0 4px; }
      .spacer { flex: 1 1 auto; min-width: 8px; }
      .url {
        flex: 0 1 auto;
        max-width: 46vw;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        color: var(--muted);
        font-size: 12px;
      }
      .open { border-color: var(--line); }
    </style>
  </head>
  <body>
    <button id="back" type="button" title="Back" aria-label="Back">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15 18l-6-6 6-6" /></svg>
    </button>
    <button id="home" type="button" title="Home" aria-label="Home">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 11l9-8 9 8" /><path d="M5 10v10h5v-6h4v6h5V10" /></svg>
      <span>Home</span>
    </button>

    <span class="divider"></span>
    <span id="tools" style="display: contents"></span>

    <span class="spacer"></span>
    <span class="url" id="url" aria-hidden="true"></span>

    <button id="open" class="open" type="button" title="Open this page in your browser">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" />
        <path d="M15 3h6v6" /><path d="M10 14L21 3" />
      </svg>
      <span>Open in Browser</span>
    </button>

    <script>
      const api = window.dispatchtoolsChrome || {};
      const backEl = document.getElementById('back');
      const homeEl = document.getElementById('home');
      const openEl = document.getElementById('open');
      const urlEl = document.getElementById('url');

      backEl.addEventListener('click', () => api.back && api.back());
      homeEl.addEventListener('click', () => api.home && api.home());
      openEl.addEventListener('click', () => api.openInBrowser && api.openInBrowser());

      // Build a pop-out button per configured compact tool. The list and the
      // open action both come from the main process via the chrome bridge.
      const TOOL_ICON =
        '<svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="4" width="18" height="14" rx="2" /><path d="M3 9h18" /></svg>';
      const tools = (api.getCompactTools && api.getCompactTools()) || [];
      const toolsEl = document.getElementById('tools');
      for (const tool of tools) {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.title = `${tool.title} — open in its own window`;
        const label = document.createElement('span');
        label.textContent = tool.label;
        btn.innerHTML = TOOL_ICON;
        btn.appendChild(label);
        btn.addEventListener('click', () => api.openCompactTool && api.openCompactTool(tool.id));
        toolsEl.appendChild(btn);
      }

      function hostFrom(url) {
        try { return new URL(url).host; } catch { return ''; }
      }

      if (api.onNavState) {
        api.onNavState((state) => {
          backEl.disabled = !state.canGoBack;
          urlEl.textContent = hostFrom(state.url);
        });
      }
    </script>
  </body>
</html>
